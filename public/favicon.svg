<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- room / background -->
  <rect width="32" height="32" rx="6" fill="#0a0c08"/>
  <!-- bezel: graphite grey, matches in-app monitor -->
  <rect x="2" y="2" width="28" height="28" rx="5" fill="#2a2c26"/>
  <!-- gasket shadow (the engraved seam between bezel and tube) -->
  <rect x="5" y="5" width="22" height="22" rx="3" fill="#050706"/>
  <!-- screen / dark phosphor face -->
  <rect x="6" y="6" width="20" height="20" rx="2" fill="#061a0c"/>
  <!-- soft phosphor halo across the middle -->
  <rect x="6" y="11" width="20" height="10" fill="#33ff66" opacity="0.18"/>
  <!-- scanline -->
  <rect x="7" y="15" width="18" height="2" fill="#33ff66"/>
  <!-- bright phosphor pulse -->
  <rect x="14" y="13" width="4" height="6" fill="#b6ffc8"/>
</svg>
